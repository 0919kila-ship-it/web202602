<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 WBC 世界棒球經典賽</title>
    <link rel="stylesheet" href="mycss-ai.css">
    <style>
        *{
          margin: 2px; 
          padding: 2px;
          
        }
        .wrapper{
            width: 1024px;
            margin-top: 30px;
            margin-bottom: 0;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 4px 4px 8px 4px var(--cherry-dream);

        }
        .logo{
            background-image: url(images/ball01.avif);
            height: 220px;
            background-position: center center;
            background-size: cover;
        }
        .header nav{
            background-color: var(--cloud-blue);
            text-align: center;
        }
        .header nav ul{
            display: inline-block;
        }
        .header nav ul li{
            float:left;
            list-style-type: none;
        }
        .header nav ul li a{
            display: block;
            padding: 15px 20px;
            background-color: var(--sunset-kiss);
            text-decoration: none;
            color:rgb(68, 17, 17);
            font-size: 24px;
            font-weight: 900;
            margin-right: 10px;
            border-radius: 10px;
            box-shadow: 2px 2px 4px 2px var(--sunset-red);
            transition: transform 0.5s;

        }
        .header nav ul li a:hover{
            transform: scale(1.02) rotate(-5deg);
            background-color: var(--lucky-red);
        }
        .content{
            padding: 30px 70px;
            text-align: center;
            background-color: var(--crystal-lake);           
        }
         .content h1{
            font-size: 30px;
            color:aliceblue;
            font-weight: 900;
            margin-bottom: 20px;
        }
        .content p{
            font-size: 20px;
            letter-spacing: 2px;
            line-height: 2.5rem;
            margin-top: 20px;
        }
        .content a{
            display: block;
            background-color: var(--fog-white);
            width: 150px;
            height: 50px;
            margin: 0 auto;
            line-height: 50px;
            text-decoration: none;
            color: beige;
            font-size: 24px;
            font-weight: 900;
            border-radius: 10px;
            box-shadow: 2px 2px 4px 2px var(--cloud-cream);
        }
        .footer{
            background-color: var(--sunset-red);
            padding-top: 10px;
            padding-bottom: 10px;
            text-align: center;
            color: var(--mint-breeze);
            font-weight: 900;
            margin-top: 5px;
            margin-bottom: 20px;
        }


        /* 針對手持裝置,*/
        @media screen and (max-width:768px){
        .wrapper{
                width: 100%;
            }
            .logo{
                background-image: url(images/ball02.avif);
                height: 120px;
            }

        .header nav{
            background-color: var(--apricot-soft);   
        }
        .header nav ul{
            display: block;
            padding-top: 5px;
            padding-bottom: 5px;
        }
        .header nav ul li{
            float:none;
        
        }
        .header nav ul li a{
            display: block;
            /* padding: y x; */
            padding: 10px 15px;
            background-color: var(--sunset-kiss);
            font-size: 20px;
            font-weight: 900;
            margin-right: 0px;
            margin-top: 5px;
            border-radius: 0px;
            box-shadow: 2px 2px 4px 2px var(--sunset-red);
         }
        .header nav ul li a:hover {
                transform: none;
                background-color: var(--papaya-light);
                }

         .content{
            padding: 5px 10px;
            background-color: var(--sunrise-orange);           
        }
         .content h1{
            font-size: 24px;
            margin-bottom: 0;
        }
        .content p{
            font-size: 15px;
            letter-spacing: 0px;
            line-height: 1.5rem;
            margin-top: 5px;
        }
        .content a{
            display: block;
            background-color: var(--fog-white);
            width: 100%;
            height: 50px;
            margin-top: 15px;
            margin-bottom: 15px;
            border-radius: 2px;
            box-shadow: 2px 2px 4px 2px var(--cloud-cream);
        }
     } 
    
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div class="logo"></div>
  <!-- nav>ul>li*5>a  快速寫法 -->
        <nav>
            <ul>
                <li><a href="#">WBC 首頁</a></li>
                <li><a href="#">最新消息</a></li>
                <li><a href="#">賽事直播</a></li>
                <li><a href="#">轉播時刻表</a></li>
                <li><a href="#">棒球經典賽分組</a></li>
            </ul>
        </nav>
    </div>
        <div class="content">

            <h1>WBC 世界棒球經典賽</h1>
            <p>2026世界棒球經典賽（WBC）今（5）日在東京巨蛋點燃戰火，中華隊在開幕戰對上澳洲隊，雙方前4局互交白卷，僵局一路到5局下半才被打破。澳洲隊先靠觸身球上壘展開攻勢，隨後Robbie Perkins轟出兩分砲先馳得點，7局下澳洲首位大聯盟選秀狀元Travis Bazzana再補上一發陽春砲擴大優勢。中華隊本場打線受壓制，全場僅敲3支安打，且6局上陳傑憲遭觸身球擊中後退場，最終以0：3不敵澳洲吞敗。 </p>

            <a href="#">了解更多</a>
        </div>
        <div class="footer">
            <p>power 跨平台班 2026.03.06</p>
        </div>
    </div>
</body>


</html>
