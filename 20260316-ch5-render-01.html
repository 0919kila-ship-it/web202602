    <style>
        /* 手機最大尺寸到768px，超過就沒有手機版頁面 */
        @media screen and (max-width: 768px){
            .table-rwd thead{
                display:none;
            }
            /* 手機版字體改變 display:block橫向 */
            .table-rwd tbody tr{
                display:block;
                border: 2px solid var(--gray-700);
                margin-top:15px;
                border-radius:8px;
                box-shadow:2px 2px 4px 2px var(--gray-900)

            }
            /* 避免跑版 overflow:hidden; */
            .table-rwd tbody tr td{
                display: block;
                overflow:hidden;
            }
            /* 偽元素 */ 
            .table-rwd tbody tr td::before{
                content: attr(data-th)" : ";
                font-size:20px;
                font-weight:900;
                color: var(--earth-900);
                display: block;
                float:left;
                width:25%;
                text-align: right;
                padding: right 10px;

            }
            .table-rwd tbody tr td span{
                display: block; 
                float:left;
                width:75%;
                
            }
        }
    </style>  
</head>
