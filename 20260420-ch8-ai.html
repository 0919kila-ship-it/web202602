<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyDream 熱氣球體驗</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/my.css">
    <style>
        .bg-cover{
            background-position:center;
            background-size:cover;
        }
        .mask{
            background: rgba(0,0,0,0.4);
        }
        .text-box{
            color: #fff;
        }
        .roller{
            position:absolute;
            bottom:20px;
            right:20px;
        }
        .roller-box-right-bottom{
            position:relative;
        }
    </style>
</head>

<body>

<div class="container-fluid">

    <!-- 🔥 主視覺 Hero -->
    <div class="row">
        <div class="col-12 vh-100 bg-cover d-flex align-items-center justify-content-center"
             style="background-image: url(images/TW01.avif);">
             
            <div class="text-center text-box">
                <h1 class="display-3">飛向天空的自由</h1>
                <p class="lead">體驗一生一次的熱氣球之旅，從台東出發</p>
                <a href="#" class="btn btn-warning btn-lg mt-3">立即預約體驗</a>
            </div>

        </div>
    </div>

    <!-- 🎯 分類入口 -->
    <div class="row">
        <div class="col-md-4 bg-cover d-flex align-items-end"
             style="background-image: url(images/TW02.avif); height: 300px;">
            <div class="text-box p-3">
                <h4>日出飛行</h4>
                <p>迎接第一道曙光</p>
            </div>
        </div>

        <div class="col-md-4 bg-cover d-flex align-items-end"
             style="background-image: url(images/TW03.avif); height: 300px;">
            <div class="text-box p-3">
                <h4>夕陽浪漫</h4>
                <p>最熱門情侶首選</p>
            </div>
        </div>

        <div class="col-md-4 bg-cover d-flex align-items-end"
             style="background-image: url(images/B05.avif); height: 300px;">
            <div class="text-box p-3">
                <h4>包場專屬</h4>
                <p>打造你的專屬天空</p>
            </div>
        </div>
    </div>

    <!-- 💰 促銷區 -->
    <div class="row">
        <div class="col-md-6 bg-cover d-flex align-items-center justify-content-center"
             style="background-image: url(images/TW05.avif); height: 400px;">
            <div class="text-box text-center">
                <h2>早鳥優惠 8 折</h2>
                <p>提前14天預約，即享限時優惠</p>
                <a href="#" class="btn btn-danger">搶先預訂</a>
            </div>
        </div>

        <div class="col-md-6 bg-cover d-flex align-items-center justify-content-center"
             style="background-image: url(images/TW06.avif); height: 400px;">
            <div class="text-box text-center">
                <h2>雙人浪漫套票</h2>
                <p>贈送紀念攝影 + 香檳</p>
                <a href="#" class="btn btn-warning">查看方案</a>
            </div>
        </div>
    </div>

    <!-- ⭐ 主打服務 -->
    <div class="row">
        <div class="col-md-3 vh-100">
            <div class="d-flex flex-column h-100">

                <div class="bg-cover h-50 d-flex align-items-end"
                     style="background-image: url(images/B07.avif);">
                    <div class="text-box p-2">專業飛行團隊</div>
                </div>

                <div class="bg-cover h-50 d-flex align-items-end"
                     style="background-image: url(images/B08.avif);">
                    <div class="text-box p-2">國際安全認證</div>
                </div>

            </div>
        </div>

        <div class="col-md-6 bg-cover roller-box-right-bottom"
             style="background-image: url(images/B09.avif); height: 100vh;">
             
            <div class="text-box text-center mt-5">
                <h2>台灣最美空中視角</h2>
                <p>俯瞰縱谷與山脈，感受前所未有的震撼</p>
            </div>

            <div class="roller">
                <a href="#" class="btn btn-light">了解更多</a>
            </div>

        </div>

        <div class="col-md-3 vh-100">
            <div class="d-flex flex-column h-100">

                <div class="bg-cover h-50 d-flex align-items-end"
                     style="background-image: url(images/TW07.avif);">
                    <div class="text-box p-2">高空攝影服務</div>
                </div>

                <div class="bg-cover h-50 d-flex align-items-end"
                     style="background-image: url(images/B04.avif);">
                    <div class="text-box p-2">客製化行程</div>
                </div>

            </div>
        </div>
    </div>

    <!-- 🚀 CTA 區 -->
    <div class="row">
        <div class="col-12 bg-dark d-flex flex-column justify-content-center align-items-center"
             style="height: 300px;">
             
            <h2 class="text-white">現在就開始你的天空旅程</h2>
            <p class="text-white">每日名額有限，立即預約</p>
            <a href="#" class="btn btn-warning btn-lg">立即預約</a>

        </div>
    </div>

</div>

<script src="js/jquery-4.0.0.js"></script>
</body>
</html>
