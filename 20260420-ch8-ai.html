<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN OUTDOOR 城市野行</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/my.css">
    <style>
        .bg-cover{
            background-position: center;
            background-size: cover;
        }
        .overlay{
            background: rgba(0,0,0,0.4);
        }
    </style>
</head>

<body>

<div class="container-fluid">

    <!-- 🔥 主視覺 Hero -->
    <div class="row vh-100">
        <div class="col-12 bg-cover d-flex align-items-center justify-content-center"
             style="background-image: url(images/TW01.avif);">

            <div class="overlay w-100 h-100 d-flex flex-column justify-content-center align-items-center text-white">
                <h1 class="display-3">探索城市之外的生活</h1>
                <p class="lead">機能 × 風格，打造你的戶外日常</p>
                <a href="#" class="btn btn-danger mt-3">立即選購</a>
            </div>

        </div>
    </div>


    <!-- 💰 促銷區 -->
    <div class="row">
        <div class="col-md-4 bg-cover d-flex align-items-end"
             style="background-image: url(images/B01.avif); height:250px;">
            <div class="text-white p-3">
                <h4>春季新品上市</h4>
                <p>全館 85 折起</p>
            </div>
        </div>

        <div class="col-md-4 bg-cover d-flex align-items-end"
             style="background-image: url(images/B02.avif); height:250px;">
            <div class="text-white p-3">
                <h4>機能外套精選</h4>
                <p>防風防水熱銷中</p>
            </div>
        </div>

        <div class="col-md-4 bg-cover d-flex align-items-end"
             style="background-image: url(images/B03.avif); height:250px;">
            <div class="text-white p-3">
                <h4>會員限定</h4>
                <p>滿3000現折500</p>
            </div>
        </div>
    </div>


    <!-- 📂 分類入口 -->
    <div class="row">
        <div class="col-md-3 vh-100">
            <div class="d-flex flex-column h-100">

                <div class="bg-cover d-flex align-items-center justify-content-center text-white"
                     style="background-image: url(images/B07.avif); height:33.3vh;">
                    <h4>登山裝備</h4>
                </div>

                <div class="bg-cover d-flex align-items-center justify-content-center text-white"
                     style="background-image: url(images/B08.avif); height:33.3vh;">
                    <h4>露營用品</h4>
                </div>

                <div class="bg-cover d-flex align-items-center justify-content-center text-white"
                     style="background-image: url(images/B09.avif); height:33.3vh;">
                    <h4>城市機能服</h4>
                </div>

            </div>
        </div>


        <!-- ⭐ 主打商品 -->
        <div class="col-md-6 bg-cover roller-box-right-bottom"
             style="background-image: url(images/TW02.avif);">

            <div class="roller text-white text-center">
                <h2>年度熱銷防水外套</h2>
                <p>全天候防護，戶外城市都適用</p>
                <a href="#" class="btn btn-warning">查看商品</a>
            </div>

        </div>


        <!-- 🛒 其他推薦 -->
        <div class="col-md-3">
            <div class="d-flex flex-column h-100">

                <div class="h-50 bg-cover d-flex align-items-end"
                     style="background-image: url(images/TW03.avif);">
                    <div class="text-white p-2">輕量登山背包</div>
                </div>

                <div class="h-50 bg-cover d-flex align-items-end"
                     style="background-image: url(images/TW04.avif);">
                    <div class="text-white p-2">露營桌椅組</div>
                </div>

            </div>
        </div>
    </div>


    <!-- 🏆 主打商品列表 -->
    <div class="row">
        <div class="col-md-3 bg-cover d-flex align-items-end"
             style="background-image: url(images/TW05.avif); height:220px;">
            <div class="text-white p-2">防水登山鞋</div>
        </div>

        <div class="col-md-3 bg-cover d-flex align-items-end"
             style="background-image: url(images/TW06.avif); height:220px;">
            <div class="text-white p-2">多功能外套</div>
        </div>

        <div class="col-md-3 bg-cover d-flex align-items-end"
             style="background-image: url(images/TW07.avif); height:220px;">
            <div class="text-white p-2">戶外帳篷</div>
        </div>

        <div class="col-md-3 bg-cover d-flex align-items-end"
             style="background-image: url(images/TW01.avif); height:220px;">
            <div class="text-white p-2">露營燈具</div>
        </div>
    </div>


    <!-- 📣 CTA 區 -->
    <div class="row">
        <div class="col-12 bg-dark text-white d-flex flex-column justify-content-center align-items-center"
             style="height:200px;">
            <h2>加入會員，開啟你的戶外生活</h2>
            <p>立即註冊享專屬優惠與新品資訊</p>
            <a href="#" class="btn btn-danger">免費加入</a>
        </div>
    </div>

</div>

<script src="js/jquery-4.0.0.js"></script>
</body>
</html>
