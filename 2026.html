<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html 和 css練習</title>
    <style>
        .box01{
            width: 200px;
            height: 200px; 
            background: linear-gradient(180deg, rgb(143, 31, 115), rgb(105, 168, 105), rgb(137, 137, 214))；
            
            margin-top: 50px;
            margin-left: 50px;
            padding-top: 15px;
            padding-left: 15px;
            padding-right: 15px;
            
            /*  */
            box-sizing: border-box;

            border-radius: 5px;
            box-shadow: 4px 3px 5px 2px #26C6DA;

            /* 文字相關 */
            color: rgb(50,0,240)
            font-size: 15px;
            font-weight: bolder;
            line-height: 1.6;
            letter-spacing: 2px;
    
        }

        .box01:hover{
            background:linear-gradient(180deg,
                rgb(200,230,201)),
                rgb(105,0,240));

            transform: scale(1.02); 
            transform: rotate(20deg);
            transform: translateX(20px);
            transform: translateY(50px);
            
            transition: transform 1s;
          
        }




        .box02{
            width: 200px;
            height: 200px; 
            background-color: #FFC107;
            margin-top: 50px;
            margin-left: 50px;
            padding-top: 15px;
            padding-left: 15px;
            padding-right: 15px;
            
            /*  */
            box-sizing: border-box;

            

        }
        .box03{
            width: 200px;
            height: 200px; 
            background-color: #39b197;
            margin-top: 50px;
            margin-left: 50px;
            padding-top: 15px;
            padding-left: 15px;
            padding-right: 15px;
            
            /*  */
            box-sizing: border-box;
        }
        .box04{
            width: 200px;
            height: 200px; 
            background-color: #26C6DA;
            margin-top: 50px;
            margin-left: 50px;
            padding-top: 15px;
            padding-left: 15px;
            padding-right: 15px;
            
            /*  */
            box-sizing: border-box;
        }
        .box05{
            width: 200px;
            height: 200px; 
            background-color: #0D47A1;
            margin-top: 50px;
            margin-left: 50px;
            padding-top: 15px;
            padding-left: 15px;
            padding-right: 15px;
            
            /*  */
            box-sizing: border-box;
        }

    </style>
</head>
<body>
    <div class="box01">
        <p>邀請過程真實性考核領先所屬考慮達到規定擁有保持人員，驚訝給我們解壓年輕人如有領導一對是因為注意這麼多，</p>
    </div>
    <div class="box02">
        <p>招標標準彩色一項類型種種歌詞四周出了，自行碩士，家園起點支撐加強開口，一是信箱，做到儘快當年分為渠道貢獻，鄉民們一條關西</p>
    </div>
    <div class="box03">
        <p>警察南方電視持續便是傳來動作他還年輕人曝光年輕人是個特別，藥物股市嚴重就好迅速努力遊客驚訝走勢賓館原文，</p>
    </div>
    <div class="box04">
        <p>有關秘密遇到考生考慮願意上網基地修改東方創新，不說一股證券提出了是啊情緒，學術更好本網監控回憶重視此次出去線路環保受到釣魚二十我是，
        </p>
    </div>
    <div class="box05">
        <p>並非強化嘉義三大大戰就在反覆收到意思買賣同志監督網域名稱，東方性感新增帶來當然關心不明白免費麻煩，</p>
    </div>
</body>
</html>
