<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ch8 spacing 排版練習02</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/my.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-4 bg-cover roller-box-left" style="background-image: url(images/TW01.avif); height: 200px;">
                <div class="roller">
                    <h3 class="text-white">夢幻派對場景佈置</h3>
                </div>
            </div>
            <div class="col-md-4 bg-cover roller-box-bottom" style="background-image: url(images/TW02.avif); height: 200px;">
                <div class="roller">
                    <h3 class="text-white">客製化活動企劃服務</h3>
                </div>
            </div>
            <div class="col-md-4 bg-cover roller-box-right" style="background-image: url(images/TW03.avif); height: 200px;">
                <div class="roller">
                    <h3 class="text-white">打造專屬節慶氛圍</h3>
                </div>
            </div>
        </div>

        <div class="row vh-100 bg-info">
            <div class="col-md-3 bg-warning">
                <div class="d-flex flex-column h-100 row">
                    <div class="bg-cover roller-box-left" style="background-image: url(images/TW04.avif); height: 33.3vh;">
                        <div class="roller">
                            <h5 class="text-white">精緻甜點饗宴</h5>
                        </div>
                    </div>
                    <div class="bg-cover roller-box-left" style="background-image: url(images/TW05.avif); height: 33.3vh;">
                        <div class="roller">
                            <h5 class="text-white">人氣拍照打卡區</h5>
                        </div>
                    </div>
                    <div class="bg-cover roller-box-left" style="background-image: url(images/TW06.avif); height: 33.3vh;">
                        <div class="roller">
                            <h5 class="text-white">質感主題派對設計</h5>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 bg-success bg-cover box01 roller-box-top" style="background-image: url(images/TW07.avif);">
                <div class="roller">
                    <h2 class="text-white">讓每一次聚會，都像品牌發表會一樣耀眼</h2>
                </div>
            </div>

            <div class="col-md-3 bg-warning">
                <div class="d-flex flex-column h-100 row">
                    <div class="h-50 bg-cover roller-box-right" style="background-image: url(images/TW08.avif);">
                        <div class="roller">
                            <h5 class="text-white">專業團隊到場支援</h5>
                        </div>
                    </div>
                    <div class="h-50 bg-cover roller-box-right" style="background-image: url(images/TW09.avif);">
                        <div class="roller">
                            <h5 class="text-white">活動細節一次到位</h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-3 bg-cover roller-box-bottom" style="background-image: url(images/B05.avif); height: 200px;">
                <div class="roller">
                    <h5 class="text-white">歡樂氣氛自然升溫</h5>
                </div>
            </div>
            <div class="col-md-3 bg-cover roller-box-bottom" style="background-image: url(images/B07.avif); height: 200px;">
                <div class="roller">
                    <h5 class="text-white">場地佈置更有記憶點</h5>
                </div>
            </div>
            <div class="col-md-3 bg-cover roller-box-bottom" style="background-image: url(images/B03.avif); height: 200px;">
                <div class="roller">
                    <h5 class="text-white">活動主題一眼就懂</h5>
                </div>
            </div>
            <div class="col-md-3 bg-cover roller-box-bottom" style="background-image: url(images/B08.avif); height: 200px;">
                <div class="roller">
                    <h5 class="text-white">留下最有溫度的瞬間</h5>
                </div>
            </div>
        </div>
    </div>

    <script src="js/jquery-4.0.0.js"></script>
</body>
</html>
