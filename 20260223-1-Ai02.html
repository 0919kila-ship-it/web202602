<!DOCTYPE html>
<html lang="zh-tw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>綠意春風卡片</title>

<style>
body{
    background: linear-gradient(180deg, #e8f5e9, #c8e6c9);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "微軟正黑體", sans-serif;
}

/* 卡片主體 */
.box01{
    width: 420px;
    height: 420px;

    /* 春風綠色漸層 */
    background: linear-gradient(180deg, #7bcf9a, #e8f5a2);

    margin-top: 50px;
    margin-left: 50px;
    padding: 50px;
    box-sizing: border-box;
    border-radius: 25px;

    /* 柔和陰影 */
    box-shadow: 
        0 10px 25px rgba(46, 125, 50, 0.4),
        inset 0 0 10px rgba(255,255,255,0.5);

    /* 文字設定 */
    color: #1b5e20;
    font-size: 26px;
    font-weight: bold;
    line-height: 1.7;
    letter-spacing: 3px;

    transition: 
        transform 0.6s ease,
        box-shadow 0.6s ease,
        background 0.6s ease,
        color 0.6s ease,
        letter-spacing 0.8s ease;
}

/* 光感效果（像陽光灑落） */
.box01::before{
    content: "";
    position: absolute;
    top: -40%;
    left: -40%;
    width: 180%;
    height: 180%;
    background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 60%);
    transform: rotate(20deg);
    opacity: 0.4;
}

/* hover 效果 */
.box01:hover{
    background: linear-gradient(180deg, #4caf50, #cddc39);

    transform: translateY(-15px) scale(1.05);

    box-shadow: 
        0 15px 35px rgba(56, 142, 60, 0.7),
        inset 0 0 15px rgba(255,255,255,0.6);

    color: #ffffff;

    letter-spacing: 6px;
}

/* 文字區塊 */
.box01 p{
    position: relative;
    z-index: 2;
    text-shadow: 1px 1px 6px rgba(0,0,0,0.2);
}

/* 標題風格（可選） */
.title{
    font-size: 32px;
    margin-bottom: 20px;
    text-align: center;
    color: #f1f8e9;
    text-shadow: 0 0 8px rgba(0,0,0,0.3);
}

/* 底部標籤 */
.tag{
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.25);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 16px;
    color: #ffffff;
    letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="box01">
    <div class="title">春風綠意企劃</div>
    <p>
        邀請過程真實性考核領先所屬考慮達到規定擁有保持人員，驚訝給我們解壓年輕人如有領導一對是因為注意這麼多。
    </p>
    <div class="tag">SPRING</div>
</div>

</body>
</html>
