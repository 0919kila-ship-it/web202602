<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chapter_17_vue是什麼?</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/my.css"> 
</head>  
<body>
    <div id="app">
        <div class="display-4 fw-bold text-bg-success">{{ message01 }}</div>
        <button class="btn btn-primary">{{ message02 }}</button>
    </div>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/vue.global.js"></script>
        <script>
            Vue.createApp({
                data() {
                    return {
                        message01: "111 Hello Vue!",
                        message02: "222 Hello Vue!"
                    }
                }
            }).mount("#app")
    </script>
</body>
</html>
