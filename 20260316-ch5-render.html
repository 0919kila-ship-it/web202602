<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ch.5 Table</title>
    <link rel="stylesheet" href="css/my.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        /* 手機最大尺寸到768px，超過就沒有手機版頁面 */
        @media screen and (max-width: 768px){
            .table-rwd thead{
                display:none;
            }
            /* 手機版字體改變 display:block橫向 */
            .table-rwd tbody tr{
                display:block;
                border: 2px solid var(--gray-700);
                margin-top:15px;
                border-radius:8px;
                box-shadow:2px 2px 4px 2px var(--gray-900)

            }
            /* 避免跑版 overflow:hidden; */
            .table-rwd tbody tr td{
                display: block;
                overflow:hidden;
            }
            /* 偽元素 */ 
            .table-rwd tbody tr td::before{
                content: attr(data-th)" : ";
                font-size:20px;
                font-weight:900;
                color: var(--earth-900);
                display: block;
                float:left;
                width:25%;
                text-align: right;
                padding: right 10px;

            }
            .table-rwd tbody tr td span{
                display: block; 
                float:left;
                width:75%;
                
            }
        }
    </style>  
</head>
<body>    
    <div class="container">
        <div class="display-4 text-center">RWD Table</div>  
        <table class="table table-bordered table-rwd">
            <thead class="table-dark">
                <tr>
                    <th width="10%">員工編號</th>
                    <th width="10%">員工姓名</th>
                    <th width="30%">員工照片</th>
                    <th width="10%">員工部門</th>
                    <th width="10%">員工職位</th>
                    <th width="30%">員工簡述</th>    
                </tr>
            </thead>
            <tbody>
                <tr class="table-success">
                    <!-- 隱藏格式data-th， data-(固定指令)th(可以改) -->
                    <!--不換行<span></span>包住一小段文字或內容-->
                    <td data-th="員工編號"><span>1001</span></td>
                    <td data-th="員工姓名"><span>趙雨凡</span></td>
                    <td data-th="員工照片"><span><img src="images/cortis01.jpg" class="img-fluid" alt=""></span></td>
                    <td data-th="員工部門"><span>資訊部</span></td>
                    <td data-th="員工職位"><span>前端工程師</span></td>
                    <td data-th="員工簡述"><span>負責公司網站前端開發與維護，熟悉HTML、CSS與JavaScript，能製作RWD響應式網頁，提升網站在手機與電腦上的瀏覽體驗，同時與設計師及後端工程師合作，確保網站功能與畫面能順利整合並穩定運作。</span></td>   
                </tr>
            </tbody>
        </table>
 

    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    
</body>
</html>
